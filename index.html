<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazonia - Shop Online</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar">
    <div class="logo">amaz<span>on</span>ia</div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search products, brands and more">
      <button id="searchBtn">🔍</button>
    </div>

    <div class="nav-right">
      <div class="account">
        <span class="small">Hello, sign in</span>
        <span class="bold">Account & Lists</span>
      </div>
      <div class="orders">
        <span class="small">Returns</span>
        <span class="bold">& Orders</span>
      </div>
      <div class="cart" id="cartIcon">
        🛒 <span id="cartCount">0</span>
        <span class="bold">Cart</span>
      </div>
    </div>
  </header>
  <nav class="category-bar">
    <span>All</span>
    <span>Electronics</span>
    <span>Fashion</span>
    <span>Home</span>
    <span>Books</span>
    <span>Toys</span>
    <span>Grocery</span>
  </nav>
  <main>
    <h2 id="resultsTitle">Recommended for you</h2>
    <div class="product-grid" id="productGrid">
    </div>
  </main>
  <div class="cart-overlay" id="cartOverlay"></div>
  <aside class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button id="closeCart">✖</button>
    </div>
    <div class="cart-items" id="cartItems">
      <p class="empty-cart-msg">Your cart is empty.</p>
    </div>
    <div class="cart-footer">
      <div class="cart-total">Total: ₹<span id="cartTotal">0</span></div>
      <button class="checkout-btn">Proceed to Checkout</button>
    </div>
  </aside>

  <footer>
    <p>&copy; 2026 Amazonia Clone. Built for demo purposes only.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
